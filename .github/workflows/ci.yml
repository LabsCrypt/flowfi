# Continuous Integration workflow for FlowFi
# Covers frontend linting/build, backend build/test, and Soroban contract build/test.
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Install Rollup Native Binding
        run: npm install @rollup/rollup-linux-x64-gnu --no-save
        working-directory: frontend

      - name: Run Frontend Tests
        run: npm test
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: flowfi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Setup Database
        run: |
          npx prisma generate --schema=prisma/schema.prisma
          npx prisma db push --accept-data-loss --schema=prisma/schema.prisma
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:password@127.0.0.1:5432/flowfi_test

      - name: Build
        run: npm run build
        working-directory: backend

      - name: Install Rollup Native Binding
        run: npm install @rollup/rollup-linux-x64-gnu --no-save

      - name: Run Backend Tests
        run: |
          ls -la src/generated/prisma
          npx vitest run --reporter=basic
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:password@127.0.0.1:5432/flowfi_test
          NODE_ENV: test

  contracts:
    name: Soroban Contracts CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "contracts -> target"

      - name: Build Contracts
        run: cargo build --target wasm32-unknown-unknown --release
        working-directory: contracts

      - name: Run Contract Tests
        run: cargo test
        working-directory: contracts

      - name: Install Stellar CLI
        run: |
          curl -fsSL https://github.com/stellar/stellar-cli/raw/main/install.sh | sh -s -- --install-deps
          echo "$HOME/.stellar-cli/bin" >> $GITHUB_PATH
        shell: bash

      - name: Optimize WASM files
        run: |
          set -euo pipefail

          # Navigate to the release directory where build artifacts are stored
          RELEASE_DIR="contracts/target/wasm32-unknown-unknown/release"

          # Find raw WASM files, excluding already optimized ones or internal deps
          WASMS=$(find "$RELEASE_DIR" -maxdepth 1 -type f -name "*.wasm" ! -name "*.optimized.wasm")

          if [ -z "$WASMS" ]; then
            echo "Error: No WASM files found in $RELEASE_DIR"
            exit 1
          fi

          for w in $WASMS; do
            filename=$(basename "$w")
            out="$RELEASE_DIR/${filename%.wasm}.optimized.wasm"
            echo "Optimizing $filename -> $(basename "$out")"
            stellar contract optimize --wasm "$w" --wasm-out "$out"
          done
        shell: bash

      - name: Upload optimized WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: optimized-soroban-contracts
          path: contracts/target/wasm32-unknown-unknown/release/*.optimized.wasm
          if-no-files-found: error
